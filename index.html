function maybePregnancy(){const adults=state.people.filter(p=>p.role==='adult');if(adults.length>=1&&!adults.some(p=>p.pregnant)&&Math.random()<.002){const p=adults[Math.floor(Math.random()*adults.length)];p.pregnant=true;p.pregnancyDays=0;say(`${p.name} discovers they are expecting a baby.`)}}
function newDay(){state.day++;for(const p of state.people){if(p.role==='child'){p.age+=1/state.ageingDays;if(Math.abs(p.age-Math.round(p.age))<.02){state.memories.push(`${p.name} had a birthday on day ${state.day}`);play('ui');say(`${p.name} is now ${Math.round(p.age)}.`)}}}const w=['Sunny','Cloudy','Rainy','Windy'];state.weather=w[Math.floor(Math.random()*w.length)];if(state.day%30===0){const s=['Spring','Summer','Autumn','Winter'];state.season=s[(s.indexOf(state.season)+1)%4]}state.house.dishes+=Math.floor(state.people.length/2);state.house.bin+=2;state.house.dirt+=2;state.house.bedsMessy+=1;state.house.plantsDry+=1;ambient()}
function advance(mins){state.minute+=mins;while(state.minute>=1440){state.minute-=1440;newDay()}for(const p of state.people){p.needs.hunger=Math.min(100,p.needs.hunger+mins/24);p.needs.thirst=Math.min(100,p.needs.thirst+mins/20);p.needs.energy=Math.min(100,p.needs.energy+mins/40);p.needs.toilet=Math.min(100,p.needs.toilet+mins/25);p.needs.social=Math.min(100,p.needs.social+mins/90)}for(const pet of state.pets){pet.needs.hunger=Math.min(100,pet.needs.hunger+mins/30);pet.needs.thirst=Math.min(100,pet.needs.thirst+mins/26);pet.needs.affection=Math.min(100,pet.needs.affection+mins/80)}for(const [name,a] of Object.entries(state.appliances))if(a.on){a.remaining-=mins;if(a.remaining<=0){a.on=false;a.remaining=0;stop(name==='Microwave'?'microwave':name==='Washing machine'?'washingMachine':'frying');if(name==='Washing machine')state.laundry.stage='washed';play('ui');say(`${name} finished`)}}}
function tick(){if(!gameStarted)return;advance(5);independentRoutine();maybePregnancy();for(const p of peopleHere()){if(p.age<1&&Math.random()<.08)play('babble',.3);else if(p.age<4&&Math.random()<.06)play('toddlerLaugh',.3);else if(p.age<11&&Math.random()<.04)play('childLaugh',.3);if(p.needs.hunger>85&&p.age<1)play('babyCry',.45)}for(const pet of petsHere())if(Math.random()<.08)play(pet.type==='dog'?'dog':'cat',.3);if(state.laundry.stage==='drying'&&Math.random()<.35)state.laundry.stage='dry';render()}
function status(){say(`${rooms[state.room].name}. ${current()}. ${state.people.length} people and ${state.pets.length} pets. Day ${state.day}, ${formatTime()}, ${state.weather}.`,true)}
function startGame(fresh=false){audioEnabled=true;gameStarted=true;$('start').classList.add('hidden');speechSynthesis.getVoices();ambient();render();say(`${rooms[state.room].name}. ${current()}.`,true)}
let sx=0,sy=0,started=0,longTimer,lastTap=0;const app=$('app');app.addEventListener('touchstart',e=>{const t=e.touches[0];sx=t.clientX;sy=t.clientY;started=Date.now();longTimer=setTimeout(status,700)},{passive:true});app.addEventListener('touchend',e=>{if(!gameStarted)return;clearTimeout(longTimer);const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy,d=Date.now()-started;if(Math.max(Math.abs(dx),Math.abs(dy))>45){Math.abs(dx)>Math.abs(dy)?moveObject(dx>0?1:-1):vertical(dy<0?1:-1);return}if(d<350){const now=Date.now();if(now-lastTap<420){interact();lastTap=0}else lastTap=now}},{passive:true});
$('buildFamily').onclick=createFamily;$('continueGame').onclick=()=>{load();startGame()};buildSetup();load();render();setInterval(tick,12000);
</script></body></html>
