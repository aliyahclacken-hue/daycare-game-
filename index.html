function chooseRecipe(){const names=Object.keys(recipes);const next=names[(names.indexOf(state.recipe?.name)+1)%names.length];state.recipe={name:next,ingredients:[...recipes[next].ingredients],prepared:[]};state.recipeStep=0;say(`${next} selected. You need ${recipes[next].ingredients.join(', ')}. Collect each ingredient and place it on the worktop.`);render()}
function progressRecipe(){if(!state.recipe)return;const r=recipes[state.recipe.name],have=state.inventory.concat(state.appliances[r.appliance]?.items||[]);const missing=r.ingredients.filter(x=>!have.includes(x)&&!state.recipe.prepared.includes(x));if(missing.length)return say(`You still need ${missing.join(', ')}.`);const step=r.steps[state.recipeStep++];if(!step)return;if(/Microwave|Oven|Hob/.test(step)){for(const i of r.ingredients)state.appliances[r.appliance].items.push(i);state.recipe.prepared=[];say(`The ${state.recipe.name.toLowerCase()} is prepared. Put it in or on the ${r.appliance.toLowerCase()} and turn it on.`)}else{play(step==='Crack eggs'||step==='Mix ingredients'||step==='Whisk'?'cutlery':step==='Chop vegetables'?'packet':'cutlery',.55);say(`You complete the next step: ${step.toLowerCase()}.`)}render()}
function parkRun(){if(state.mia.room!==state.room)return say('Mia is not here.');if(state.mia.ageMonths<12)return say('Mia is not old enough to run yet, but she can crawl and explore safely.');state.mia.spot='running freely';state.mia.confined=false;play(state.room==='park'?'runGravel':'runIndoor',.6);setTimeout(()=>play('toddlerLaugh',.6),450);say('Mia runs around, changes direction, laughs, and calls for you. You stay close while she explores.');render()}
function miaPlay(activity){if(state.mia.room!==state.room)return say('Mia is not here.');state.mia.spot=activity;state.mia.confined=false;play('childLaugh',.55);say(`Mia plays on the ${activity}, making excited toddler noises.`);render()}
function scheduleVisitor(type='neighbour'){if(state.visitor)return;state.visitor={type,name:type==='friend'?'Sophie':'Nadia',need:['a cup of tea','help finding a lost toy','some spare nappies','company because she feels lonely','help calming her child'][Math.floor(Math.random()*5)],stage:0};setTimeout(()=>{play(Math.random()<.5?'doorbell':'knock',.7);say(`Someone is at the front door.`)},2500)}
function visitorInteraction(){if(!state.visitor)return say('There is nobody visiting right now.');const v=state.visitor;if(v.stage===0){play('hello');say(`${v.name} says hello. She needs ${v.need}.`);v.stage=1}else{state.relationships[v.name]=(state.relationships[v.name]||0)+1;state.stars++;play('ui');say(`You help ${v.name} with ${v.need}. She thanks you and your friendship grows.`);state.visitor=null}render()}
function toddlerEvent(){if(state.mia.ageMonths<12||state.mia.state==='asleep'||state.mia.confined)return;const events=['fall','mouth','throw','hide','cuddle','mess'];const e=events[Math.floor(Math.random()*events.length)];if(e==='fall'){play(state.room==='park'?'runGravel':'runIndoor',.55);setTimeout(()=>cry('hurt after a little fall'),500);say('Mia runs, catches her foot, and falls. She cries and needs checking and comfort.')}else if(e==='mouth'){state.mia.need='being stopped from putting a small object in her mouth';play('toddlerShout');say('Mia picks up a small object and starts lifting it towards her mouth. You need to interact with Mia to stop and redirect her.')}else if(e==='throw'){play('ball');state.mia.need='excited after throwing a toy';say('Mia throws a toy across the room, laughs, and points at it.')}else if(e==='hide'){state.mia.spot='hiding nearby';play('childLaugh');say('Mia goes quiet, then giggles from behind nearby furniture.')}else if(e==='cuddle'){state.mia.need='wants a cuddle';play('toddlerShout');say('Mia comes towards you saying, “Mummy, up.”')}else{state.mia.need='made a toddler mess';play('blocks');say('Mia tips a basket of toys onto the floor and starts happily exploring everything.')}render()}
function clinic(){play('medicine');state.mia.need='checked and well';say('The nurse checks Mia, listens to your concerns, and gives age-appropriate advice.');render()}
function shopAisle(o){const item=o.includes('Fruit')?'Apples':o.includes('Fridge')?'Milk':o.includes('Baby')?'Nappies':'Soap';take(item)}
function checkout(){if(!state.holding)return say('You are not holding anything to buy.');if(state.money<2)return say('You do not have enough money.');state.money-=2;state.inventory.push(state.holding);state.holding=null;play('checkout');say('The item is scanned and you pay for it.');render()}
function cafeMenu(){say('The menu has tea, juice, toast, soup, and a toddler snack plate. Double-tap the counter to order.')}function cafeCounter(){if(state.money<4)return say('You do not have enough money.');state.money-=4;play('cutlery');say('You order food and sit together. Mia eats, drinks, and watches the room.');state.mia.hunger=0;state.mia.thirst=0;render()}
function newDay(){state.day++;state.mia.ageProgress++;if(state.mia.ageProgress>=3){state.mia.ageProgress=0;state.mia.ageMonths++;state.stars++;play('ui');say(`Mia is now ${state.mia.ageMonths} months old. New skills and behaviours may appear.`)}const weathers=['Sunny','Cloudy','Rainy','Windy'];state.weather=weathers[Math.floor(Math.random()*weathers.length)];if(state.day%30===0){const ss=['Spring','Summer','Autumn','Winter'];state.season=ss[(ss.indexOf(state.season)+1)%4]}if(Math.random()<.55)scheduleVisitor();ambient()}
function advance(mins){state.minute+=mins;while(state.minute>=1440){state.minute-=1440;newDay()}state.player.hunger=Math.max(0,state.player.hunger-mins/30);state.player.thirst=Math.max(0,state.player.thirst-mins/25);state.player.energy=Math.max(0,state.player.energy-mins/45);state.player.toilet=Math.min(100,state.player.toilet+mins/25);state.mia.hunger=Math.min(100,state.mia.hunger+mins/22);state.mia.thirst=Math.min(100,state.mia.thirst+mins/20);state.mia.energy=Math.max(0,state.mia.energy-mins/35);state.mia.potty=Math.min(100,state.mia.potty+mins/18);for(const [name,a] of Object.entries(state.appliances))if(a.on){a.remaining-=mins;if(a.remaining<=0){a.on=false;a.remaining=0;stop(name==='Microwave'?'microwave':name==='Washing machine'?'washingMachine':'frying');if(name==='Washing machine')state.laundry.stage='washed';play('ui');say(name==='Washing machine'?'The washing machine has finished. The clothes are clean and wet, ready for the drying rack.':`The ${name.toLowerCase()} has finished.`)}}}
function tick(){advance(5);if(state.mia.state!=='asleep'){if(state.mia.hunger>75&&!state.mia.crying)cry('hungry');else if(state.mia.thirst>80&&!state.mia.crying)cry('thirsty');else if(state.mia.energy<20&&!state.mia.crying)cry('tired');else if(state.mia.hygiene<30&&!state.mia.crying)cry('needs cleaning')}if(state.mia.pottyTraining&&state.mia.potty>75){if(state.mia.potty>95&&Math.random()<.35){play(Math.random()<.7?'pee':'poo');state.mia.potty=0;state.mia.hygiene=25;cry('upset after a potty accident');say('Mia has a potty-training accident and cries for you.')}else if(Math.random()<.25){play('toddlerShout');state.mia.need='needs the potty';say('Mia fidgets and says, “Potty.”')}}if(state.mia.ageMonths>=12&&!state.mia.confined&&Math.random()<.09)toddlerEvent();if(state.mia.room===state.room&&state.mia.state!=='asleep'&&Math.random()<.12)play(state.mia.ageMonths>=15?'toddlerLaugh':'babble',.45);if(state.mia.room===state.room&&state.mia.ageMonths<12&&!state.mia.confined&&Math.random()<.08)play('crawl',.45);if(state.mia.room===state.room&&Math.random()<.025){const r=Math.random();if(r<.25)play('sneeze',.55);else if(r<.5)play('cough',.5);else if(r<.72)play('fart',.45);else if(r<.86)play('squeak',.45);else play('toddlerShout',.5)}render()}
function status(){say(`${rooms[state.room].name}. ${current()}. ${state.holding?'Holding '+state.holding:'Hands free'}. You are ${state.player.sitting?'sitting on '+state.player.sitting:'standing'}. Mia is ${state.mia.ageMonths} months old, ${state.mia.need}, in ${rooms[state.mia.room]?.name||state.mia.room}, ${state.mia.spot}. Day ${state.day}, ${formatTime()}, ${state.weather}. ${state.stars} stars.`)}
function toast(t){$('toast').textContent=t;$('toast').classList.remove('hidden');setTimeout(()=>$('toast').classList.add('hidden'),2400)}
let sx=0,sy=0,started=0,longTimer,lastTap=0;const app=$('app');app.addEventListener('touchstart',e=>{const t=e.touches[0];sx=t.clientX;sy=t.clientY;started=Date.now();longTimer=setTimeout(status,700)},{passive:true});app.addEventListener('touchend',e=>{clearTimeout(longTimer);const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy,d=Date.now()-started;if(Math.max(Math.abs(dx),Math.abs(dy))>45){Math.abs(dx)>Math.abs(dy)?moveObject(dx>0?1:-1):vertical(dy<0?1:-1);return}if(d<350){const now=Date.now();if(now-lastTap<420){interact();lastTap=0}else lastTap=now}},{passive:true});
$('begin').onclick=()=>{audioEnabled=true;$('start').classList.add('hidden');speechSynthesis.getVoices();ambient();say(`${rooms[state.room].name}. ${current()}.`);render()};
setInterval(tick,12000);setInterval(()=>{if(state.recipe&&state.room==='kitchen'&&current()==='Worktop')progressRecipe()},20000);render();
</script></body></html>
