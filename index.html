function checkout(){let b=state.bags['Shop basket'];if(!b.length){say('Your shop basket is empty.');return}if(state.money<state.shopTotal){say('You do not have enough money.');return}for(const item of b){if(['Milk','Cheese','Yogurt','Juice'].includes(item))containers.Fridge.push(item);else if(['Nappies','Baby wipes','Baby shampoo','Baby wash','Soap','Shampoo','Toothpaste','Towels'].includes(item))containers['Bathroom cupboard'].push(item);else containers['Food cupboard'].push(item)}state.money-=state.shopTotal;b.length=0;state.shopTotal=0;sound('checkoutBeep');setTimeout(()=>sound('checkoutCash'),350);say('You pay at the checkout. Your shopping will be waiting in the hallway when you return home.');render()}
function outsideMenu(){let opts=['House','Park','Shop','Field'];let i=0;say('House');const handler=e=>{let dx=e.changedTouches?e.changedTouches[0].clientY-startY:0;if(Math.abs(dx)>30){i=(i+(dx<0?1:-1)+opts.length)%opts.length;say(opts[i])}};let startY=0;const st=e=>startY=e.touches[0].clientY;const end=e=>handler(e);const dbl=()=>{document.removeEventListener('touchstart',st);document.removeEventListener('touchend',end);document.removeEventListener('dblclick',dbl);let d=opts[i];if(d==='House')enterRoom('hall');if(d==='Park')enterRoom('parkEntrance');if(d==='Shop')enterRoom('shopEntrance');if(d==='Field')enterRoom('field')};document.addEventListener('touchstart',st,{once:false});document.addEventListener('touchend',end,{once:false});document.addEventListener('dblclick',dbl,{once:true});toast('Choose a destination with up or down, then double-tap.')}
function status(){say(`${rooms[state.room].name}. ${current()}. ${state.holding?'Holding '+state.holding+'.':'Your hands are free.'} Mia is ${state.mia.need}, ${state.mia.spot}, in ${rooms[state.mia.room]?.name||state.mia.room}. You have ${state.money} pounds.`)}
function toast(t){$('toast').textContent=t;$('toast').classList.remove('hidden');setTimeout(()=>$('toast').classList.add('hidden'),2500)}
let sx=0,sy=0,st=0,longTimer=null,lastTap=0;const app=$('app');app.addEventListener('touchstart',e=>{let t=e.touches[0];sx=t.clientX;sy=t.clientY;st=Date.now();longTimer=setTimeout(status,700)},{passive:true});app.addEventListener('touchend',e=>{clearTimeout(longTimer);let t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy,d=Date.now()-st;if(Math.max(Math.abs(dx),Math.abs(dy))>45){if(Math.abs(dx)>Math.abs(dy))move(dx>0?1:-1);else roomMove(dy<0?1:-1);return}if(d<350){let now=Date.now();if(now-lastTap<420){interact();lastTap=0}else lastTap=now}},{passive:true});
setInterval(()=>{state.player.hunger=Math.max(0,state.player.hunger-.3);state.player.thirst=Math.max(0,state.player.thirst-.4);state.player.toilet=Math.min(100,state.player.toilet+.25);state.player.tired=Math.min(100,state.player.tired+.18);if(Math.random()<.06){let needs=['hungry','tired','needs a clean nappy','wants a cuddle','wants to play','wants to go outside'];state.mia.need=needs[Math.floor(Math.random()*needs.length)];if(state.mia.need==='tired')sound('babyCry');else if(Math.random()<.5)sound('babyBabble');}else if(state.mia.state!=='asleep'&&Math.random()<.018){sound('babySneeze');say('Mia sneezes.')}else if(state.mia.room===state.room&&state.mia.spot==='Floor'&&Math.random()<.025){sound('babyCrawl',false,.7)}render()},15000);
$('begin').onclick=()=>{$('start').classList.add('hidden');speechSynthesis.getVoices();say(rooms[state.room].name);render();ambient()};render();
</script></body></html>
